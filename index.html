<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Inventory Dashboard</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background-color:#add8e6;
}

.container{
  width:80%;
  margin:20px auto;
  background:#fff;
  padding:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  border-radius:8px;
}

h1{
  text-align:center;
}

.menu-bar{
  display:flex;
  justify-content:center;
  background-color:#007bff;
  padding:10px;
}

.menu-bar a{
  color:white;
  padding:10px 20px;
  text-decoration:none;
  font-size:18px;
  border-radius:4px;
  margin-left:5px;
}

.menu-bar a:hover{
  background-color:#0056b3;
}

form{
  margin-bottom:20px;
}

input{
  padding:8px;
  margin-right:10px;
  border:1px solid #ccc;
  border-radius:4px;
}

button{
  padding:8px 16px;
  background-color:#007bff;
  color:#fff;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

button:hover{
  background-color:#0056b3;
}

.clear-button{
  background-color:#d9534f;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:20px;
}

th,td{
  padding:12px;
  border:1px solid #ddd;
  text-align:left;
}

th{
  background-color:#007bff;
  color:white;
}
</style>
</head>

<body>

<div class="menu-bar">
<a href="index.html">Dashboard</a>
<a href="about.html">About</a>
</div>

<div class="container">

<h1>Warehouse Inventory Dashboard</h1>

<form id="addItemForm">
<label>Item Name:</label>
<input type="text" id="itemName" required>

<label>Quantity:</label>
<input type="number" id="itemQuantity" min="1" step="1" required>

<button type="submit">Add Item</button>
</form>

<canvas id="inventoryChart" width="400" height="200"></canvas>

<table id="inventoryTable">
<thead>
<tr>
<th>Item Name</th>
<th>Quantity</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button id="clearAllButton" class="clear-button">Clear All Items</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const form = document.getElementById('addItemForm');
const tableBody = document.querySelector('#inventoryTable tbody');
const clearBtn = document.getElementById('clearAllButton');
const ctx = document.getElementById('inventoryChart').getContext('2d');

let items = JSON.parse(localStorage.getItem('items')) || [];
let quantities = JSON.parse(localStorage.getItem('quantities')) || [];

// Render inventory table
function renderTable(){
tableBody.innerHTML='';

items.forEach((item,index)=>{
const row=document.createElement('tr');
row.innerHTML=`<td>${item}</td><td>${quantities[index]}</td>`;
tableBody.appendChild(row);
});
}

// Create chart
const chart = new Chart(ctx,{
type:'bar',
data:{
labels:items,
datasets:[{
label:'Item Quantity',
data:quantities,
backgroundColor: quantities.map(q => q < 10 ? '#8B0000' : '#007bff')
}]
},
options:{
responsive:true,
scales:{
y:{beginAtZero:true}
}
}
});

// Update chart
function updateChart(){
chart.data.labels = items;
chart.data.datasets[0].data = quantities;

chart.data.datasets[0].backgroundColor =
quantities.map(q => q < 10 ? '#8B0000' : '#007bff');

chart.update();
}

// Low stock alarm system
function checkLowStock(item, quantity){
if(quantity < 10){
alert("⚠ Low Stock Alert: " + item + " only has " + quantity + " units left!");
}
}

// Add new inventory item
form.addEventListener('submit', function(e){

e.preventDefault();

let name = document.getElementById('itemName').value.trim();
let qtyInput = document.getElementById('itemQuantity').value;
let qty = Number(qtyInput);

// Prevent duplicate items
if(items.includes(name)){
alert("Duplicate items are not allowed.");
return;
}

// Prevent letters or invalid numbers
if(isNaN(qty)){
alert("Quantity must be a number.");
return;
}

// Prevent negative numbers or zero
if(qty <= 0){
alert("Quantity must be greater than zero.");
return;
}

// Ensure whole numbers only
if(!Number.isInteger(qty)){
alert("Quantity must be a whole number.");
return;
}

items.push(name);
quantities.push(qty);

localStorage.setItem('items',JSON.stringify(items));
localStorage.setItem('quantities',JSON.stringify(quantities));

renderTable();
updateChart();
checkLowStock(name, qty);

form.reset();

});

// Clear inventory
clearBtn.addEventListener('click',function(){

localStorage.removeItem('items');
localStorage.removeItem('quantities');

items=[];
quantities=[];

renderTable();
updateChart();

});

// Initial load
renderTable();
updateChart();

</script>

</body>
</html>
